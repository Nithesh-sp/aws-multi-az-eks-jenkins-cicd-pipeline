apiVersion: v1
kind: seriveAccount 
metadata: 
  name: jenkins
  namespace: jenkins

---
apiVersion: rbac.authoriztion.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-role
rules:
 - apiGroups: [""]
   resource: ["pods","pods/log","pods/exec"]
   verbs: ["get","watch","list","create","delete"]
 - apiGroups: [""]
   resource: ["secrets"]
   verbs: ["get"]

---
apiVersion: rabc.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadaata: 
   name: jenkins-binding
roleRef: 
   apiGroups: rbac.authorization.k8s.io
   kind: ClusterRole
   name: jenkins-role
subject: 
   - kind: ServiceAccount
     name: jenkins
     namespace: jenkins`
