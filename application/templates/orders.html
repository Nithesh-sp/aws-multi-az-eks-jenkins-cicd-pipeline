<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Order Entry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cabin&display=swap');
        body {
            
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            font-family: 'Cabin', sans-serif;
            background-image: url('{% static "images/bg.jpg" %}');
            background-size: cover;
            background-position: center;           
                }


        nav {
        background: linear-gradient(135deg, #04db65, #04d8db);
      display: flex;
      align-items: center;
      justify-content: space-between;
     margin-bottom: 50px;
      padding: 10px;
      
    }

    nav a {
      text-decoration: none;
      color:#fff;
      padding: 10px;
      transition: transform 0.3s ease;
    }

    nav a:hover {
      transform: scale(1.5);
    }

    .logo {
      margin-right: auto;
      background-color: #fff;
            margin: 5px;
            margin-right: 20px;
            height: 80px;
            width: 80px;
            border-radius: 50%;
            cursor: pointer;
    }

    .links {
      margin-left:0px 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-grow: 2;
    }
    
    .links a {
      margin-left: 10px;
      margin-right: 10px;
      cursor: pointer;
    }
    .right-links {
      margin-left: auto;
      cursor: pointer;
      
   }

    .right-links a {
      margin-left: 5px;
      margin-right: 5px;
      color:#fff;
      border-radius: 30px;      
      transition: transform 0.3s ease;
    }

    .right-links a:hover {
        box-shadow: 0px 0px 5px black;
        transform: scale(1.5);
        background-color: #04d8db;
        color: #fff;
    }

    /***first block****/
    .main-block {
            margin-top:2vh ;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            
            height: 90vh; 
        }

        .image-block {
            flex: 1;
            display: flex;
            justify-content: space-around;
        }

        .image-block img {
            max-width: 100%;
            height: auto;
        }

        .text-block {
            flex: 1;
            padding: 0 20px;
        }

        .buttons {
            margin-top: 10px;
        }

        .buttons .button {
            padding: 10px;
            margin-right: 10px;
            text-decoration: none;
            color: black;
            cursor: pointer;
        }

        .buttons .buttonen {
            background-color: #04db65;
            border: 1px solid black;
            color: #fff;
        }

        .buttons .buttonlm {
           
            border: 1px solid black;
        }


        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 50px;
        }

        label {
            font-weight: bold;
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        #get-coordinates {
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 3px;
            padding: 8px 16px;
            cursor: pointer;
        }

        #get-coordinates:hover {
            background-color: #0056b3;
        }

        #submit-order {
            background-color: #4caf50;
            color: #fff;
            border: none;
            border-radius: 3px;
            padding: 10px 20px;
            cursor: pointer;
        }

        #submit-order:hover {
            background-color: #45a049;
        }
        
        .form-group
        {
            margin: 10px ;
        }
        .form-row {
            display: flex;
            justify-content: space-between;
        }
    
        .column {
            flex: 1;
        }
    </style>
</head>
<body>
    <nav>
        <div >
          <a href="{% url 'home' %}"><img src="{% static 'images/Dailelogo.png' %}" class="logo" alt="Logo" ></a>
        </div>
        
        <div class="links">
          <a href="{% url 'home' %}">Home</a>
          <a href="{% url 'price_list' %}">Price</a>
          <a href="{% url 'order_entry' %}">Place Order</a>
          <a href="{% url 'task_page' %}">Track</a>
          <a href="#">Partners</a>
        </div>
    
        <div class="right-links">
          <a href="#" >Sign Up</a>
          <a href="#" >Login</a>
        </div>
      </nav>

   
      {% if user.is_authenticated %}
    <div class="container">
        <h1>Place Order</h1>
        <form method="post" id="order-form">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label for="company">Company:</label>
                    <select name="company" id="company">
                        {% for company in companies %}
                            <option value="{{ company.id }}">{{ company.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="product">Product:</label>
                    <select name="product" id="product">
                        {% for product in products %}
                            <option value="{{ product.id }}">{{ product.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity:</label>
                    <input type="number" name="quantity" id="quantity">
                </div>
            </div>
    
            <div class="form-row">
                <div class="column">
                    
                    <div class="form-group">
                        <label for="houseName">House Name:</label>
                        <input type="text" name="houseName" id="houseName">
                    </div>

                    <div class="form-group">
                        <label for="landmark">Landmark:</label>
                        <input type="text" name="landmark" id="landmark">
                    </div>

                    <div class="form-group">
                        <label for="pincode">Pincode:</label>
                        <input type="text" name="pincode" id="pincode">
                    </div>
                    
                </div>
    
                <div class="column">
                    <div class="form-group">
                        <label for="area">Area:</label>
                        <input type="text" name="area" id="area">
                    </div>
                   
                    <div class="form-group">
                        <label for="city">City:</label>
                        <input type="text" name="city" id="city">
                    </div>
                    <div class="form-group">
                        <label for="state">State:</label>
                        <input type="text" name="state" id="state">
                    </div>
                </div>
            </div>
    
            <br>
            <div class="form-row">
                <button type="submit" id="submit-order">Place Order</button>
            </div>
        </form>
    </div>
    {% else %}
           <h2> Your not logined  to <a href="{% url 'signin' %}">LogIn</a> </h2>
           {%  endif %}
     
    
    
</body>
</html>
